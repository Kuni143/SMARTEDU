<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <link rel="icon" type="image/png" href="/pics/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/CSS/signup.css">
</head>
<body>
  <div class="page-wrapper">

    <a class="logo" href="landpage.html">
      <img src="/pics/logo.png" alt="SmartEdu Logo" />
      <span class="logo-name">SmartEdu</span>
    </a>

    <div class="left-panel">
      <div class="card">
        <h1>Start your journey today!</h1>
        <p class="subtitle">Create an account and discover the right path.</p>

        <!-- Username -->
        <div class="input-group">
          <input type="text" placeholder="Username" id="username" />
        </div>

        <!-- Email -->
        <div class="input-group">
          <input type="email" placeholder="Email:" id="email" />
        </div>

        <!-- Password -->
        <div class="input-group">
          <input type="password" placeholder="Password" id="pw1" />
          <button class="toggle-btn" onclick="togglePw('pw1', this)" aria-label="Toggle password visibility">
            <svg id="eye-pw1" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <!-- Eye open (default) -->
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        <!-- Confirm Password -->
        <div class="input-group">
          <input type="password" placeholder="Confirm Password *" id="pw2" oninput="checkPasswords()" />
          <button class="toggle-btn" onclick="togglePw('pw2', this)" aria-label="Toggle confirm password visibility">
            <svg id="eye-pw2" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <!-- Eye open (default) -->
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        <!-- Error message shown when passwords don't match -->
        <p class="error-msg" id="pw-error">Make sure you entered the same password.</p>

        <button class="btn-next" onclick="handleNext()">Next</button>

        <!-- Login redirect -->
        <p class="login-redirect">Already have an account? <a href="login.html">Log in!</a></p>
        
      </div>
    </div>

    <div class="illustration">
      <img src="/pics/signup.png"/>
    </div>

  </div>

  <script src="/JS/signup.js"></script>
</body>
</html>
