<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartEdu</title>
  <link rel="icon" type="image/png" href="/pics/logo.png">
  <link rel="stylesheet" href="/CSS/landpage.css">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica+SC&family=IM+Fell+English:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Ramabhadra&family=Sora:wght@100..800&display=swap');
  </style>
</head>

<body>  
  <!-- HERO -->
  <section class="hero">
    <div class="topbar">
      <a href="#about">About</a>
      <button onclick="location.href='signup.html'">Get Started</button>
    </div>

    <img src="/pics/univpic.png" alt="University Illustration">
  </section>

  <!-- ABOUT -->
  <section class="about" id="about">

    <!-- LEFT -->
    <div class="about-content">
      <h1>Discover Your Personalized College Pathway</h1>
      <p>
        Our scoring-based recommendation algorithm analyzes your SHS strand, skills,
        interests, and academic performance to predict your ideal college course and
        match you with universities in NCR.
      </p>

      <div class="button-row">
        <a class="btn-primary" href="signup.html">Get my Recommendation →</a>
        <a class="btn-secondary" href="login.html">Log In →</a>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="about-image">
      <img src="/pics/abtpic.png" alt="Path Illustration">
    </div>

  </section>

</body>
</html>
