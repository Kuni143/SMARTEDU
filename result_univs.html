<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>University Result</title>
  <link rel="icon" type="image/png" href="/pics/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Sora', sans-serif;
      background: #ced4df;
      overflow-x: hidden;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.75); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.95); }
    * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.75) transparent; }

    /* ═══ SIDEBAR OVERLAY ═══ */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 300;
    }
    .sidebar-overlay.show { display: block; }

    /* ═══ SIDEBAR ═══ */
    .sidebar {
      position: fixed; top: 0; right: -280px;
      width: 220px; height: 100vh;
      background: #fff; border-radius: 20px 0 0 20px;
      z-index: 400; display: flex; flex-direction: column;
      padding: 24px 20px 28px;
      transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
      box-shadow: -4px 0 24px rgba(0,0,0,0.1);
    }
    .sidebar.open { right: 0; }

    .sidebar-close {
      align-self: flex-end; background: none; border: none;
      font-size: 18px; color: #061685; cursor: pointer;
      padding: 2px 4px; line-height: 1; margin-bottom: 18px;
    }

    .sidebar-top {
      display: flex; flex-direction: column;
      align-items: center; gap: 10px; margin-bottom: 28px;
    }

    .sidebar-logo { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; }
    .sidebar-username { font-size: 14px; font-weight: 600; color: #061685; text-align: center; }

    .sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }

    .sidebar-link {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 12px;
      font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600;
      color: #444; text-decoration: none;
      transition: background 0.18s, color 0.18s;
    }
    .sidebar-link svg { width: 20px; height: 20px; fill: #888; stroke: none; flex-shrink: 0; transition: fill 0.18s; }
    .sidebar-link:hover { background: #eef0fb; color: #061685; }
    .sidebar-link:hover svg { fill: #061685; }
    .sidebar-link:hover svg[style] { stroke: #061685; fill: none; }
    .sidebar-link.active { background: #dde2f8; color: #061685; }
    .sidebar-link.active svg { fill: #061685; }
    .sidebar-link.active svg[style] { stroke: #061685; fill: none; }

    .sidebar-bottom { margin-top: auto; }

    .sidebar-logout {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 12px;
      font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600;
      color: #444; text-decoration: none; cursor: pointer;
      background: none; border: none; width: 100%;
      transition: background 0.18s, color 0.18s;
    }
    .sidebar-logout svg {
      width: 20px; height: 20px; fill: none;
      stroke: #888; stroke-width: 2; stroke-linecap: round;
      stroke-linejoin: round; flex-shrink: 0; transition: stroke 0.18s;
    }
    .sidebar-logout:hover { background: #fdecea; color: #c0392b; }
    .sidebar-logout:hover svg { stroke: #c0392b; }

    /* ═══ NAVBAR ═══ */
    .navbar {
      width: 100%; height: 72px; background: #ced4df;
      display: flex; align-items: center;
      justify-content: space-between; padding: 0 32px;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; }
    .nav-logo span { font-size: 15px; font-weight: 600; color: #101d89; }
    .hamburger { display: flex; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 6px; }
    .hamburger span { display: block; width: 28px; height: 3px; background: #101d89; border-radius: 2px; transition: opacity 0.2s; }
    .hamburger:hover span { opacity: 0.7; }

    /* ═══ MAIN ═══ */
    .main { max-width: 1100px; margin: 0 auto; padding: 16px 24px 48px; }

    /* Search + Filter row */
    .search-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    .search-wrap { flex: 1; position: relative; }
    .search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      width: 20px; height: 20px; stroke: #888; fill: none;
      stroke-width: 2; stroke-linecap: round; pointer-events: none;
    }
    .search-wrap input {
      width: 100%; height: 52px; border-radius: 30px; border: none; outline: none;
      padding: 0 20px 0 46px; font-family: 'Inter', sans-serif; font-size: 15px;
      color: #333; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.08); transition: box-shadow 0.2s;
    }
    .search-wrap input:focus { box-shadow: 0 0 0 3px rgba(6,22,133,0.15); }
    .search-wrap input::placeholder { color: #aaa; }

    /* Filter */
    .filter-wrap { position: relative; flex-shrink: 0; }
    .filter-btn {
      width: 52px; height: 52px; border-radius: 50%; border: none; background: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); transition: background 0.2s;
    }
    .filter-btn:hover { background: #f0f2ff; }
    .funnel-icon { width: 22px; height: 22px; stroke: #101d89; fill: #101d89; stroke-width: 1.5; }
    .filter-dropdown {
      display: none; position: absolute; top: 60px; right: 0;
      background: #fff; border-radius: 14px; box-shadow: 0 6px 24px rgba(0,0,0,0.13);
      padding: 14px 16px 12px; min-width: 210px; z-index: 200;
    }
    .filter-dropdown.open { display: block; }
    .filter-header { display: flex; flex-direction: column; gap: 6px; margin-bottom: 4px; }
    .filter-type-label { font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 600; color: #888; }
    .filter-current {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; height: 38px; border-radius: 8px; border: 1px solid #ddd;
      background: #fff; padding: 0 12px; font-family: 'Sora', sans-serif;
      font-size: 14px; font-weight: 600; color: #061685; cursor: pointer;
    }
    .filter-current svg { width: 16px; height: 16px; stroke: #061685; fill: none; stroke-width: 2.5; stroke-linecap: round; transition: transform 0.2s; }
    .filter-current svg.flipped { transform: rotate(180deg); }
    .type-dropdown { display: none; margin-top: 8px; border: 1px solid #e0e4f0; border-radius: 10px; overflow: hidden; }
    .type-dropdown.open { display: block; }
    .type-dropdown-top { display: flex; justify-content: space-between; padding: 8px 12px; background: #f7f8fc; border-bottom: 1px solid #e0e4f0; }
    .type-dropdown-top button { background: none; border: none; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: #061685; cursor: pointer; }
    .type-opt { display: flex; align-items: center; gap: 10px; padding: 9px 14px; font-family: 'Inter', sans-serif; font-size: 14px; color: #222; cursor: pointer; border-bottom: 1px solid #f0f2f8; transition: background 0.15s; }
    .type-opt:last-of-type { border-bottom: none; }
    .type-opt:hover { background: #f0f2ff; }
    .type-opt input { accent-color: #061685; width: 15px; height: 15px; }
    .type-dropdown-btns { display: flex; justify-content: flex-end; gap: 8px; padding: 8px 12px; background: #f7f8fc; border-top: 1px solid #e0e4f0; }
    .td-cancel { background: none; border: none; font-family: 'Inter', sans-serif; font-size: 13px; color: #666; cursor: pointer; padding: 4px 8px; }
    .td-done { background: #061685; color: #fff; border: none; border-radius: 20px; font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600; padding: 5px 18px; cursor: pointer; transition: opacity 0.2s; }
    .td-done:hover { opacity: 0.88; }

    /* Tag row */
    .tag-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; min-height: 28px; }
    .tag { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: #061685; cursor: pointer; padding: 2px 0; border-bottom: 2px solid transparent; transition: border-color 0.15s; white-space: nowrap; }
    .tag.active-tag { border-bottom: 2px solid #061685; }

    /* Grid */
    .grid-wrapper { height: 692px; overflow: hidden; flex-shrink: 0; }
    .school-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; align-content: start; }
    .school-card { background: #fff; border-radius: 18px; padding: 22px 20px 18px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: box-shadow 0.2s, transform 0.15s; height: 220px; }
    .school-card.hidden { visibility: hidden; pointer-events: none; }
    .school-card:hover { box-shadow: 0 6px 20px rgba(6,22,133,0.12); transform: translateY(-2px); }
    .school-name { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700; color: #061685; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .school-desc { font-family: 'Inter', sans-serif; font-size: 12px; color: #555; line-height: 1.55; flex: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; }
    .school-card-footer { display: flex; justify-content: flex-end; flex-shrink: 0; }
    .btn-details { background: #061685; color: #fff; border: none; border-radius: 20px; font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600; padding: 7px 20px; cursor: pointer; transition: opacity 0.2s, transform 0.15s; }
    .btn-details:hover { opacity: 0.88; transform: translateY(-1px); }
    .no-results { grid-column: 1 / -1; text-align: center; padding: 48px 0; font-family: 'Inter', sans-serif; font-size: 15px; color: #777; }

    /* ═══ LOGOUT MODAL ═══ */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.25); z-index: 500;
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff; border-radius: 18px; padding: 28px 28px 22px;
      width: 340px; box-shadow: 0 12px 48px rgba(6,22,133,0.18);
      position: relative; border-top: 4px solid #6a8ef0;
    }
    .modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 20px; color: #6a8ef0; cursor: pointer; line-height: 1; }
    .modal-body { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; }
    .modal-icon { width: 28px; height: 28px; flex-shrink: 0; background: #6a8ef0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; color: #fff; font-weight: 700; margin-top: 2px; }
    .modal-text { font-family: 'Inter', sans-serif; font-size: 14px; color: #222; line-height: 1.55; font-weight: 500; }
    .modal-divider { height: 1px; background: #e8ecf5; margin-bottom: 16px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
    .btn-cancel { border-radius: 20px; padding: 8px 22px; font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: #8bb2fd; color: #fff; transition: opacity 0.2s; }
    .btn-cancel:hover { opacity: 0.85; }
    .btn-confirm { border-radius: 20px; padding: 8px 22px; font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: #061685; }
    .btn-confirm:hover { text-decoration: underline; }

    @media (max-width: 900px) { .school-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 680px) { .school-grid { grid-template-columns: repeat(2, 1fr); } .main { padding: 12px 14px 40px; } }
    @media (max-width: 420px) { .school-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<!-- Sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMenu()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <button class="sidebar-close" onclick="closeMenu()" aria-label="Close">&#x2715;</button>
  <div class="sidebar-top">
    <img src="/pics/logo.png" alt="SmartEdu Logo" class="sidebar-logo"/>
    <p class="sidebar-username">User Name here</p>
  </div>
  <nav class="sidebar-nav">
    <a href="dashb_user.html" class="sidebar-link active">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a href="profile.html" class="sidebar-link">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v1h20v-1c0-3.3-6.7-5-10-5z"/></svg>
      Profile
    </a>
    <a href="studform.html" class="sidebar-link">
      <svg viewBox="0 0 24 24" style="fill:none;stroke:#888;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="16" y2="11"/><line x1="8" y1="15" x2="13" y2="15"/></svg>
      Form
    </a>
    <a href="results.html" class="sidebar-link">
      <svg viewBox="0 0 24 24" style="fill:none;stroke:#888;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 9 15"/></svg>
      Result history
    </a>
  </nav>
  <div class="sidebar-bottom">
    <button class="sidebar-logout" onclick="openLogoutModal()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Log Out
    </button>
  </div>
</aside>

<!-- Navbar -->
<nav class="navbar">
  <a class="nav-logo" href="result_univs.html">
    <img src="/pics/logo.png" alt="SmartEdu Logo"/>
    <span>SmartEdu</span>
  </a>
  <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- Main -->
<main class="main">

  <!-- Search + Filter row -->
  <div class="search-row">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search" oninput="handleSearch()"/>
    </div>
    <div class="filter-wrap">
      <button class="filter-btn" id="filterBtn" onclick="toggleFilter()">
        <svg viewBox="0 0 24 24" class="funnel-icon"><polygon points="3 5 10 14 10 21 14 19 14 14 21 5 3 5"/></svg>
      </button>
      <div class="filter-dropdown" id="filterDropdown">
        <div class="filter-header">
          <span class="filter-type-label">Institution Type:</span>
          <button class="filter-current" id="filterCurrentBtn" onclick="toggleTypeDropdown()">
            <span id="filterCurrentText">All</span>
            <svg viewBox="0 0 24 24" id="filterChevron"><polyline points="18 15 12 9 6 15"/></svg>
          </button>
        </div>
        <div class="type-dropdown" id="typeDropdown">
          <div class="type-dropdown-top">
            <button onclick="selectAll()">Select all</button>
            <button onclick="clearAll()">Clear</button>
          </div>
          <label class="type-opt"><input type="checkbox" value="All" onchange="handleTypeCheck(this)" checked> All</label>
          <label class="type-opt"><input type="checkbox" value="LUC" onchange="handleTypeCheck(this)"> LUC</label>
          <label class="type-opt"><input type="checkbox" value="OGS" onchange="handleTypeCheck(this)"> OGS</label>
          <label class="type-opt"><input type="checkbox" value="SUC" onchange="handleTypeCheck(this)"> SUC</label>
          <label class="type-opt"><input type="checkbox" value="Private" onchange="handleTypeCheck(this)"> Private</label>
          <div class="type-dropdown-btns">
            <button class="td-cancel" onclick="cancelFilter()">Cancel</button>
            <button class="td-done" onclick="applyFilter()">Done</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tag row -->
  <div class="tag-row" id="tagRow">
    <span class="tag active-tag" id="activeFilterTag">Civil Engineering</span>
    <span class="tag" onclick="clearSearch()">All Search</span>
  </div>

  <!-- Grid -->
  <div class="grid-wrapper">
    <div class="school-grid" id="schoolGrid"></div>
  </div>

</main>

<!-- LOGOUT MODAL -->
<div class="modal-overlay" id="logoutModal">
  <div class="modal">
    <button class="modal-close" onclick="closeLogoutModal()">&#x2715;</button>
    <div class="modal-body">
      <div class="modal-icon">i</div>
      <p class="modal-text">Are you sure you want to log out?</p>
    </div>
    <div class="modal-divider"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeLogoutModal()">Cancel</button>
      <button class="btn-confirm" onclick="window.location.href='login.html'">Log Out</button>
    </div>
  </div>
</div>

<script>
  /* ── School data ── */
  var SCHOOLS = [
    { name: 'Universidad ng Pilipinas', type: 'SUC', desc: 'Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.' },
    { name: 'Mapúa University', type: 'Private', desc: 'Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.' },
    { name: 'De La Salle University', type: 'Private', desc: 'Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.' },
    { name: 'Technological University of the Philippines', type: 'SUC', desc: 'Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.' },
    { name: 'FEU Institute of Technology', type: 'Private', desc: 'Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium.' },
    { name: 'National University', type: 'Private', desc: 'Totam rem aperiam, eaque ipsa quae ab illo inventore veritatis et quasi architecto beatae vitae dicta sunt explicabo.' },
    { name: 'Pamantasan ng Lungsod ng Maynila', type: 'LUC', desc: 'Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit.' },
    { name: 'Polytechnic University of the Philippines', type: 'SUC', desc: 'Neque porro quisquam est qui dolorem ipsum quia dolor sit amet, consectetur adipisci velit.' },
    { name: 'Ateneo de Manila University', type: 'Private', desc: 'At vero eos et accusamus et iusto odio dignissimos ducimus qui blanditiis praesentium voluptatum deleniti.' },
    { name: 'University of Santo Tomas', type: 'Private', desc: 'Nam libero tempore cum soluta nobis est eligendi optio cumque nihil impedit quo minus id quod maxime placeat.' },
    { name: 'Adamson University', type: 'Private', desc: 'Temporibus autem quibusdam et aut officiis debitis aut rerum necessitatibus saepe eveniet ut et voluptates.' },
    { name: 'Pamantasan ng Lungsod ng Pasig', type: 'LUC', desc: 'Itaque earum rerum hic tenetur a sapiente delectus ut aut reiciendis voluptatibus maiores alias consequatur.' },
  ];

  var activeTypes  = ['All'];
  var pendingTypes = ['All'];
  var searchQuery  = '';

  function buildGrid() {
    var grid = document.getElementById('schoolGrid');
    grid.innerHTML = SCHOOLS.map(function(s, i) {
      return (
        '<div class="school-card" id="card-' + i + '">' +
          '<div class="school-name">' + s.name + '</div>' +
          '<div class="school-desc">'  + s.desc + '</div>' +
          '<div class="school-card-footer">' +
            '<button class="btn-details" onclick="goDetails(\'' + encodeURIComponent(s.name) + '\')">Details</button>' +
          '</div>' +
        '</div>'
      );
    }).join('');
  }

  function applyVisibility() {
    SCHOOLS.forEach(function(s, i) {
      var card = document.getElementById('card-' + i);
      if (!card) return;
      var matchType   = activeTypes.includes('All') || activeTypes.includes(s.type);
      var matchSearch = !searchQuery ||
        s.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
        s.desc.toLowerCase().includes(searchQuery.toLowerCase());
      if (matchType && matchSearch) { card.classList.remove('hidden'); }
      else { card.classList.add('hidden'); }
    });
  }

  function goDetails(name) {
    window.location.href = 'detail_univ.html?name=' + name;
  }

  function handleSearch() {
    searchQuery = document.getElementById('searchInput').value.trim();
    applyVisibility();
  }

  function clearSearch() {
    searchQuery = '';
    document.getElementById('searchInput').value = '';
    applyVisibility();
  }

  function toggleFilter() {
    var dd = document.getElementById('filterDropdown');
    if (!dd.classList.contains('open')) { pendingTypes = activeTypes.slice(); syncCheckboxes(); }
    dd.classList.toggle('open');
  }

  function toggleTypeDropdown() {
    document.getElementById('typeDropdown').classList.toggle('open');
    document.getElementById('filterChevron').classList.toggle('flipped');
  }

  function syncCheckboxes() {
    document.querySelectorAll('.type-opt input[type="checkbox"]').forEach(function(cb) {
      cb.checked = pendingTypes.includes(cb.value);
    });
    updateCurrentText();
  }

  function updateCurrentText() {
    var el = document.getElementById('filterCurrentText');
    el.textContent = (pendingTypes.includes('All') || pendingTypes.length === 0) ? 'All' : pendingTypes.join(', ');
  }

  function handleTypeCheck(cb) {
    if (cb.value === 'All') {
      pendingTypes = cb.checked ? ['All'] : [];
      document.querySelectorAll('.type-opt input[type="checkbox"]').forEach(function(b) { b.checked = (b.value === 'All' && cb.checked); });
    } else {
      var allBox = document.querySelector('.type-opt input[value="All"]');
      if (allBox) allBox.checked = false;
      pendingTypes = pendingTypes.filter(function(t) { return t !== 'All'; });
      if (cb.checked) { if (!pendingTypes.includes(cb.value)) pendingTypes.push(cb.value); }
      else { pendingTypes = pendingTypes.filter(function(t) { return t !== cb.value; }); }
    }
    updateCurrentText();
  }

  function selectAll() { pendingTypes = ['All']; syncCheckboxes(); }

  function clearAll() {
    pendingTypes = [];
    document.querySelectorAll('.type-opt input[type="checkbox"]').forEach(function(b) { b.checked = false; });
    updateCurrentText();
  }

  function applyFilter() {
    activeTypes = pendingTypes.length ? pendingTypes.slice() : ['All'];
    closeFilterDropdown(); applyVisibility();
  }

  function cancelFilter() { pendingTypes = activeTypes.slice(); closeFilterDropdown(); }

  function closeFilterDropdown() {
    document.getElementById('filterDropdown').classList.remove('open');
    document.getElementById('typeDropdown').classList.remove('open');
    document.getElementById('filterChevron').classList.remove('flipped');
  }

  document.addEventListener('click', function(e) {
    var dd  = document.getElementById('filterDropdown');
    var btn = document.getElementById('filterBtn');
    if (dd.classList.contains('open') && !dd.contains(e.target) && !btn.contains(e.target)) {
      closeFilterDropdown();
    }
  });

  /* ── Sidebar ── */
  function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
  }

  function closeMenu() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
  }

  /* ── Logout modal ── */
  function openLogoutModal() {
    closeMenu();
    document.getElementById('logoutModal').classList.add('show');
  }

  function closeLogoutModal() {
    document.getElementById('logoutModal').classList.remove('show');
  }

  document.getElementById('logoutModal').addEventListener('click', function(e) {
    if (e.target === this) closeLogoutModal();
  });

  /* ── Init ── */
  buildGrid();
  applyVisibility();
</script>
</body>
</html>
